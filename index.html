<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園訂餐系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        :root {
            --primary: #FF6B6B;
            --primary-dark: #EE5A5A;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2D3436;
            --light: #F7F7F7;
            --white: #FFFFFF;
            --shadow: 0 8px 32px rgba(45, 52, 54, 0.12);
            --shadow-hover: 0 16px 48px rgba(45, 52, 54, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* 頂部標題 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--white);
            text-shadow: 3px 3px 0 var(--primary), 6px 6px 0 rgba(0,0,0,0.2);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p {
            color: var(--white);
            font-size: 1.1rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* 主要卡片 */
        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-hover);
            animation: slideUp 0.8s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 步驟指示器 */
        .steps {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 10px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .step.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .step.inactive {
            background: var(--light);
            color: #999;
        }

        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.3);
        }

        .step.inactive .step-number {
            background: #ddd;
            color: #999;
        }

        /* 頁面區塊 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 學校選擇頁面 */
        .schools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .school-card {
            background: linear-gradient(145deg, var(--white), #f0f0f0);
            border: 3px solid transparent;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .school-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .school-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }

        .school-card:hover::before {
            transform: scaleX(1);
        }

        .school-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .school-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
        }

        /* 登入表單 */
        .login-form {
            max-width: 450px;
            margin: 0 auto;
        }

        .selected-school {
            background: linear-gradient(135deg, var(--secondary), #3DBDB5);
            color: var(--white);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--dark);
            font-size: 1rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 16px 20px;
            border: 3px solid #e0e0e0;
            border-radius: 14px;
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* 按鈕 */
        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #00B894, #00A383);
            color: var(--white);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 184, 148, 0.5);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--accent), #FFD93D);
            color: var(--dark);
            box-shadow: 0 6px 20px rgba(255, 230, 109, 0.4);
        }

        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 230, 109, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        /* 星期選擇器 */
        .days-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .day-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--light);
            border: 3px solid transparent;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-checkbox:hover {
            background: #e8e8e8;
            transform: translateY(-2px);
        }

        .day-checkbox.selected {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: var(--primary);
        }

        .day-check {
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-radius: 5px;
            position: relative;
            transition: all 0.3s ease;
        }

        .day-checkbox.selected .day-check {
            border-color: white;
            background: white;
        }

        .day-checkbox.selected .day-check::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 6px;
            width: 5px;
            height: 10px;
            border-right: 2px solid var(--primary);
            border-bottom: 2px solid var(--primary);
            transform: rotate(45deg);
        }

        .day-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* 餐單頁面 */
        .menu-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .menu-header h2 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .date-display {
            background: linear-gradient(135deg, var(--accent), #FFE066);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            color: var(--dark);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .meal-card {
            background: linear-gradient(145deg, var(--white), #fafafa);
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid transparent;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            position: relative;
        }

        .meal-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--secondary);
            box-shadow: var(--shadow-hover);
        }

        .meal-card.selected {
            border-color: var(--primary);
            background: linear-gradient(145deg, #fff5f5, #ffe8e8);
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.2), var(--shadow-hover);
        }

        .meal-card.selected::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .meal-card.selected::before {
            content: '';
            position: absolute;
            top: 22px;
            right: 26px;
            width: 12px;
            height: 6px;
            border-left: 3px solid white;
            border-bottom: 3px solid white;
            transform: rotate(-45deg);
            z-index: 1;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .meal-image {
            height: 120px;
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
        }

        .meal-info {
            padding: 20px;
        }

        .meal-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .meal-desc {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .meal-price {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
        }

        .meal-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .tag-hot { background: #ffebee; color: #c62828; }
        .tag-veg { background: #e8f5e9; color: #2e7d32; }
        .tag-rec { background: #fff3e0; color: #ef6c00; }

        /* 管理員後台 */
        .admin-panel {
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--light);
            padding-bottom: 15px;
        }

        .admin-tab {
            padding: 12px 24px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .admin-tab:hover {
            background: var(--light);
            color: var(--dark);
        }

        .admin-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
        }

        .admin-content {
            display: none;
        }

        .admin-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        /* 每日餐點選擇 */
        .daily-meals-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .daily-meal-section {
            background: var(--light);
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .daily-meal-section:hover {
            border-color: var(--secondary);
        }

        .daily-meal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 20px;
            background: var(--white);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .daily-meal-header:hover {
            background: #f8f8f8;
        }

        .day-toggle {
            width: 24px;
            height: 24px;
            border: 3px solid #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .day-toggle.active {
            background: var(--secondary);
            border-color: var(--secondary);
        }

        .day-toggle.active::after {
            content: '';
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .day-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--dark);
            flex: 1;
        }

        .day-status {
            font-size: 0.9rem;
            color: #999;
            font-weight: 500;
        }

        .daily-meal-options {
            padding: 20px;
            transition: all 0.3s ease;
        }

        .daily-meal-options.hidden {
            display: none;
        }

        .daily-meal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .daily-meal-card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .daily-meal-card:hover {
            border-color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .daily-meal-card.selected {
            border-color: var(--primary);
            background: linear-gradient(145deg, #fff5f5, #ffe8e8);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.2);
        }

        .daily-meal-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .daily-meal-desc {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .daily-meal-price {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .daily-meal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }

        .daily-tag {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* 時菜加購 */
        /* 鮮魚觸發卡片 */
        .fish-trigger-card, .veg-trigger-card {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .fish-trigger-card {
            background: #fff8f0;
            border: 2px dashed #FF8C42;
        }
        .fish-trigger-card:hover {
            background: #fff0e0;
            border-color: #e07a35;
        }
        .veg-trigger-card {
            background: #f0faf5;
            border: 2px dashed #4ECDC4;
        }
        .veg-trigger-card:hover {
            background: #e0f7ef;
            border-color: #3dbeb5;
        }
        .fish-trigger-card .daily-meal-name,
        .veg-trigger-card .daily-meal-name {
            flex: 1;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .fish-status {
            font-size: 0.8rem;
            color: var(--gray);
            flex: 1;
            text-align: right;
        }
        .fish-trigger-card .daily-meal-name { color: #d35400; }
        .veg-trigger-card .daily-meal-name { color: #27ae60; }
        .fish-arrow {
            font-size: 0.75rem;
            color: var(--gray);
            width: 20px;
            text-align: center;
        }

        /* 鮮魚/時菜子選單 */
        .fish-sub-menu.hidden, .veg-sub-menu.hidden {
            display: none;
        }
        .fish-sub-menu, .veg-sub-menu {
            margin-top: 8px;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            animation: slideDown 0.3s ease;
        }
        .fish-sub-menu .daily-meal-card {
            border: 2px solid #ffe0c0;
            background: #fffbf5;
        }
        .fish-sub-menu .daily-meal-card:hover { background: #fff5eb; }
        .fish-sub-menu .daily-meal-card.selected {
            background: #FF8C42;
            color: white;
            border-color: #FF8C42;
        }
        .fish-sub-menu .daily-meal-card.selected .daily-meal-price { color: #fff8e0; }
        .veg-sub-menu .daily-meal-card {
            border: 2px solid #c8f0eb;
            background: #f8fcfb;
        }
        .veg-sub-menu .daily-meal-card:hover { background: #f0f9f6; }
        .veg-sub-menu .daily-meal-card.selected {
            background: #4ECDC4;
            color: white;
            border-color: #4ECDC4;
        }
        .veg-sub-menu .daily-meal-card.selected .daily-meal-price { color: #e0f7ef; }

        @keyframes slideDown {
            from { max-height: 0; opacity: 0; }
            to { max-height: 500px; opacity: 1; }
        }

        /* WhatsApp 按鈕 */
        .btn-whatsapp {
            width: 100%;
            padding: 16px 24px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
        .btn-whatsapp:hover {
            background: #1ebe5d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }
        .btn-whatsapp:active {
            transform: translateY(0);
        }
        .whatsapp-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* 餐單編輯 */
        .menu-editor {
            background: var(--light);
            border-radius: 16px;
            padding: 25px;
        }

        .meal-edit-item {
            background: var(--white);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .meal-edit-item:hover {
            border-color: var(--secondary);
            box-shadow: var(--shadow);
        }

        .meal-edit-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .meal-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .meal-edit-fields {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
        }

        .meal-edit-fields input, .meal-edit-fields select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .meal-edit-fields input:focus, .meal-edit-fields select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .edit-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 0.95rem;
        }

        /* 訂單統計 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

                const fishSelectedName = selFish ? fishMenu.find(f => f.id === selFish).name : '';
                fishSection = `<div class="fish-trigger-card" onclick="toggleFishMenu('${day}')">
                    <div class="daily-meal-name">是日鮮魚 $60</div>
                    <div class="fish-status">${fishSelectedName ? '已選：' + fishSelectedName : '點擊選擇'}</div>
                    <div class="fish-arrow">${fishExpanded ? '▲' : '▼'}</div>
                </div>
                <div class="fish-sub-menu ${fishExpanded ? '' : 'hidden'}" id="fish-sub-${day}">
                    ${fishMenu.map(fish => `<div class="daily-meal-card ${selFish === fish.id ? 'selected' : ''}" onclick="selectFishForDay('${day}','${fish.id}')">
                        <div class="daily-meal-name">${fish.name}</div>
                        <div class="daily-meal-price">$${fish.price}</div>
                    </div>`).join('')}
                </div>`;

                // 時菜部分
                let vegSection = '';
                const vegSelectedName = selVeg ? vegOptions.find(v => v.id === selVeg).name : '';
                vegSection = `<div class="veg-trigger-card" onclick="toggleVegMenu('${day}')">
                    <div class="daily-meal-name">是日時菜 +$${vegAddOnPrice}</div>
                    <div class="fish-status">${vegSelectedName ? '已選：' + vegSelectedName : '點擊選擇'}</div>
                    <div class="fish-arrow">${vegExpanded ? '▲' : '▼'}</div>
                </div>
                <div class="veg-sub-menu ${vegExpanded ? '' : 'hidden'}" id="veg-sub-${day}">
                    ${vegOptions.map(veg => `<div class="daily-meal-card veg-option-card ${selVeg === veg.id ? 'selected' : ''}" onclick="selectVegForDay('${day}','${veg.id}')">
                        <div class="daily-meal-name">${veg.name}</div>
                        <div class="daily-meal-price">+$${vegAddOnPrice}</div>
                    </div>`).join('')}
                </div>`;

                // 計算已選狀態文字
                let statusText = '請選擇餐點';
                if (selMeal) statusText = dayMenu.find(m => m.id === selMeal).name;
                else if (selFish) statusText = fishMenu.find(f => f.id === selFish).name;
                if (selVeg) statusText += ' + ' + vegOptions.find(v => v.id === selVeg).name;

                html += `
                    <div class="daily-meal-section" id="day-section-${day}">
                        <div class="daily-meal-header" onclick="toggleDaySection('${day}')">
                            <div class="day-toggle ${selectedDays[day] ? 'active' : ''}" id="day-toggle-${day}"></div>
                            <span class="day-title">${dayNames[day]}</span>
                            <span class="day-status" id="day-status-${day}">${selectedDays[day] ? statusText : '跳過這天'}</span>
                        </div>
                        <div class="daily-meal-options ${selectedDays[day] ? '' : 'hidden'}" id="day-options-${day}">
                            <div class="daily-meal-grid">${mealCards}</div>
                            ${fishSection}
                            ${vegSection}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 切換鮮魚子選單
        function toggleFishMenu(day) {
            const el = document.getElementById('fish-sub-' + day);
            if (!el) return;
            expandedFishByDay[day] = !expandedFishByDay[day];
            el.classList.toggle('hidden');
            // 更新箭頭
            const trigger = el.previousElementSibling;
            if (trigger) {
                const arrow = trigger.querySelector('.fish-arrow');
                if (arrow) arrow.textContent = expandedFishByDay[day] ? '▲' : '▼';
            }
        }

        // 為某天選擇鮮魚
        function selectFishForDay(day, fishId) {
            if (selectedFishByDay[day] === fishId) {
                selectedFishByDay[day] = null; // 取消選擇
            } else {
                selectedFishByDay[day] = fishId;
                selectedMealsByDay[day] = null; // 選魚就取消主餐
            }
            renderDailyMeals();
        }

        // 切換時菜子選單
        function toggleVegMenu(day) {
            const el = document.getElementById('veg-sub-' + day);
            if (!el) return;
            expandedVegByDay[day] = !expandedVegByDay[day];
            el.classList.toggle('hidden');
            const trigger = el.previousElementSibling;
            if (trigger) {
                const arrow = trigger.querySelector('.fish-arrow');
                if (arrow) arrow.textContent = expandedVegByDay[day] ? '▲' : '▼';
            }
        }

        // 為某天選擇時菜
        function selectVegForDay(day, vegId) {
            if (selectedVegByDay[day] === vegId) {
                selectedVegByDay[day] = null; // 取消選擇
            } else {
                selectedVegByDay[day] = vegId;
            }
            renderDailyMeals();
        }

        // 切換某天是否訂餐
        function toggleDaySection(day) {
            selectedDays[day] = !selectedDays[day];

            const toggleEl = document.getElementById(`day-toggle-${day}`);
            const optionsEl = document.getElementById(`day-options-${day}`);
            const statusEl = document.getElementById(`day-status-${day}`);

            if (selectedDays[day]) {
                toggleEl.classList.add('active');
                optionsEl.classList.remove('hidden');
                statusEl.textContent = selectedMealsByDay[day] ? '已選擇' : '請選擇餐點';
            } else {
                toggleEl.classList.remove('active');
                optionsEl.classList.add('hidden');
                statusEl.textContent = '跳過這天';
            }
        }

        // 為某天選擇主餐
        function selectMealForDay(day, mealId) {
            if (selectedMealsByDay[day] === mealId) {
                selectedMealsByDay[day] = null; // 取消選擇
            } else {
                selectedMealsByDay[day] = mealId;
                selectedFishByDay[day] = null; // 選主餐就取消魚
            }
            renderDailyMeals();
        }

        // 切換某天是否訂餐
        function toggleDay(day) {
            selectedDays[day] = !selectedDays[day];
            const dayEl = document.getElementById('day-' + day);
            if (selectedDays[day]) {
                dayEl.classList.add('selected');
            } else {
                dayEl.classList.remove('selected');
            }
            // 更新餐單顯示（顯示第一個選中的日子的餐單）
            updateMenuDisplay();
        }

        // 更新餐單顯示
        function updateMenuDisplay() {
            const selectedDayList = Object.keys(selectedDays).filter(d => selectedDays[d]);
            const dayNames = { mon: '星期一', tue: '星期二', wed: '星期三', thu: '星期四', fri: '星期五' };

            if (selectedDayList.length > 0) {
                // 顯示第一個選中的日子的餐單
                currentDayMenu = selectedDayList[0];
                menuData = weeklyMenu[currentDayMenu];
                renderMenu();

                // 更新顯示目前查看的餐單
                const menuDayEl = document.getElementById('currentMenuDay');
                if (menuDayEl) {
                    menuDayEl.textContent = `正在查看：${dayNames[currentDayMenu]} 餐單`;
                }
            } else {
                const menuDayEl = document.getElementById('currentMenuDay');
                if (menuDayEl) {
                    menuDayEl.textContent = '';
                }
            }
        }

        // 選擇餐點
        function selectMeal(mealId) {
            selectedMeal = mealId;
            renderMenu();
        }

        // 渲染餐單
        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            if (!grid) return;
            grid.innerHTML = menuData.map(meal => `
                <div class="meal-card ${selectedMeal === meal.id ? 'selected' : ''}" onclick="selectMeal('${meal.id}')">
                    <div class="meal-info">
                        <div class="meal-name">${meal.name}</div>
                        <div class="meal-price">$${meal.price}</div>
                    </div>
                </div>
            `).join('');
        }

        // 確認訂購
        function confirmOrder() {
            // 檢查是否有選擇要訂餐的日子
            const selectedDayList = Object.keys(selectedDays).filter(d => selectedDays[d]);
            if (selectedDayList.length === 0) {
                alert('請至少選擇一天訂餐！');
                return;
            }

            // 檢查每個選中的日子是否都有選擇餐點（主餐或魚餐）
            const missingMealDays = selectedDayList.filter(day => !selectedMealsByDay[day] && !selectedFishByDay[day]);
            if (missingMealDays.length > 0) {
                const dayNames = { mon: '星期一', tue: '星期二', wed: '星期三', thu: '星期四', fri: '星期五' };
                alert(`請為以下日子選擇餐點：${missingMealDays.map(d => dayNames[d]).join('、')}`);
                return;
            }

            const name = document.getElementById('studentName').value.trim();
            const className = document.getElementById('studentClass').value;

            const dayNames = {
                mon: '星期一',
                tue: '星期二',
                wed: '星期三',
                thu: '星期四',
                fri: '星期五'
            };

            let totalPrice = 0;
            let orderDetails = [];

            // 為每一天創建訂單
            selectedDayList.forEach(day => {
                const dayMenu = weeklyMenu[day];
                let mealName = '';
                let mealPrice = 0;
                let hasVeg = false;
                let vegName = '';

                if (selectedMealsByDay[day]) {
                    const meal = dayMenu.find(m => m.id === selectedMealsByDay[day]);
                    mealName = meal.name;
                    mealPrice = meal.price;
                } else if (selectedFishByDay[day]) {
                    const fish = fishMenu.find(f => f.id === selectedFishByDay[day]);
                    mealName = fish.name;
                    mealPrice = fish.price;
                }

                if (selectedVegByDay[day]) {
                    const veg = vegOptions.find(v => v.id === selectedVegByDay[day]);
                    hasVeg = true;
                    vegName = veg.name;
                    mealPrice += vegAddOnPrice;
                }

                const order = {
                    id: Date.now() + Math.random(),
                    school: currentSchool,
                    name: name,
                    class: className,
                    meal: mealName + (hasVeg ? ' + ' + vegName : ''),
                    day: dayNames[day],
                    price: mealPrice,
                    hasVeg: hasVeg,
                    time: new Date().toLocaleString('zh-HK'),
                    status: 'confirmed'
                };
                orders.push(order);
                totalPrice += mealPrice;
                orderDetails.push({ day: dayNames[day], meal: mealName, hasVeg: hasVeg, vegName: vegName, price: mealPrice });
            });

            saveData();

            // 發送訂單到 Google Sheet
            sendOrderToSheet(name, className, studentId, orderDetails);

            // 生成訂單文字
            lastOrderText = `*校園訂餐訂單*\n` +
                `學校：${currentSchool}\n` +
                `姓名：${name}\n` +
                `班別：${className}\n` +
                `─────────────\n` +
                orderDetails.map(o => `${o.day}：${o.meal}${o.hasVeg ? ' +' + o.vegName : ''} ($${o.price})`).join('\n') +
                `\n─────────────\n` +
                `*總價：$${totalPrice}*`;

            // 顯示訂單摘要
            let orderDetailsHtml = orderDetails.map(o => `
                <div class="summary-row">
                    <span>${o.day}</span>
                    <span>${o.meal}${o.hasVeg ? ' <span style="color:var(--secondary);">+ ' + o.vegName + '</span>' : ''} ($${o.price})</span>
                </div>
            `).join('');

            document.getElementById('orderSummary').innerHTML = `
                <div class="summary-row">
                    <span>學校</span>
                    <span>${currentSchool}</span>
                </div>
                <div class="summary-row">
                    <span>姓名</span>
                    <span>${name}</span>
                </div>
                <div class="summary-row">
                    <span>班別</span>
                    <span>${className}</span>
                </div>
                ${orderDetailsHtml}
                <div class="summary-row" style="border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 15px;">
                    <span>總價</span>
                    <span>$${totalPrice}</span>
                </div>
            `;

            goToPage(4);
        }

        // 重置訂單
        function resetOrder() {
            selectedMealsByDay = { mon: null, tue: null, wed: null, thu: null, fri: null };
            selectedFishByDay = { mon: null, tue: null, wed: null, thu: null, fri: null };
            selectedVegByDay = { mon: null, tue: null, wed: null, thu: null, fri: null };
            expandedFishByDay = { mon: false, tue: false, wed: false, thu: false, fri: false };
            expandedVegByDay = { mon: false, tue: false, wed: false, thu: false, fri: false };
            selectedDays = { mon: true, tue: true, wed: true, thu: true, fri: true };
            currentDayMenu = 'mon';
            menuData = weeklyMenu.mon;
            document.getElementById('studentName').value = '';
            document.getElementById('studentClass').value = '';
            document.getElementById('studentId').value = '';
            goToPage(1);
        }

        // 保存最近一次訂單文字
        let lastOrderText = '';

        // Google Sheet Apps Script 網址
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzwP3qW7MB51Zwqqqhky-GtFs9M_U3EHWVJBjhBuN10l_Mn9qudUpjinPr9EqSMa7va/exec';

        // 複製訂單文字
        function copyOrderText() {
            if (lastOrderText) {
                navigator.clipboard.writeText(lastOrderText).then(() => {
                    alert('訂單已複製到剪貼簿！可以貼到 WhatsApp / Signal / Telegram 發送給朋友。');
                }).catch(() => {
                    // fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = lastOrderText;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('訂單已複製到剪貼簿！');
                });
            }
        }

        // 發送訂單到 Google Sheet
        function sendOrderToSheet(name, className, studentId, details) {
            const sheetData = {
                school: currentSchool,
                name: name,
                class: className,
                studentId: studentId,
                orders: details.map(o => ({
                    day: o.day,
                    meal: o.meal,
                    hasVeg: o.hasVeg,
                    vegName: o.vegName || '',
                    price: o.price
                }))
            };

            fetch(SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sheetData)
            }).catch(function(err) {
                console.log('Sheet error:', err);
            });
        }

        // 發送訂單到 WhatsApp
        function sendToWhatsApp() {
            if (!lastOrderText) return;
            const phone = '85268795508';
            const encoded = encodeURIComponent(lastOrderText);
            const url = `https://wa.me/${phone}?text=${encoded}`;
            window.open(url, '_blank');
        }

        // ========== 管理員功能 ==========

        // 打開管理員登入
        function openAdminLogin() {
            document.getElementById('adminLoginModal').classList.add('active');
            document.getElementById('adminPassword').value = '';
        }

        // 關閉管理員登入
        function closeAdminLogin() {
            document.getElementById('adminLoginModal').classList.remove('active');
        }

        // 管理員登入
        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {  // 簡單密碼，實際使用應更安全
                closeAdminLogin();
                showAdminPanel();
            } else {
                alert('密碼錯誤！');
            }
        }

        // 顯示管理員面板
        function showAdminPanel() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('adminPanel').classList.add('active');
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            renderMenuEditor();
            renderOrdersList();
        }

        // 關閉管理員面板
        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
            goToPage(1);
        }

        // 切換管理員標籤
        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.admin-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('admin' + (tab === 'menu' ? 'Menu' : 'Orders')).classList.add('active');

            if (tab === 'orders') {
                renderOrdersList();
            } else if (tab === 'menu') {
                renderMenuEditor();
            }
        }

        // 渲染餐單編輯器
        function renderMenuEditor() {
            const editor = document.getElementById('menuEditor');
            const dayNames = { mon: '星期一', tue: '星期二', wed: '星期三', thu: '星期四', fri: '星期五' };

            let html = `
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: 700; margin-right: 10px;">選擇要編輯的日子：</label>
                    <select id="editDaySelect" onchange="switchEditDay(this.value)" style="padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem;">
                        <option value="mon" ${currentDayMenu === 'mon' ? 'selected' : ''}>星期一</option>
                        <option value="tue" ${currentDayMenu === 'tue' ? 'selected' : ''}>星期二</option>
                        <option value="wed" ${currentDayMenu === 'wed' ? 'selected' : ''}>星期三</option>
                        <option value="thu" ${currentDayMenu === 'thu' ? 'selected' : ''}>星期四</option>
                        <option value="fri" ${currentDayMenu === 'fri' ? 'selected' : ''}>星期五</option>
                    </select>
                </div>
                <h3 style="margin-bottom: 20px; color: var(--dark);">${dayNames[currentDayMenu]} 餐單</h3>
            `;

            html += menuData.map((meal, index) => `
                <div class="meal-edit-item">
                    <div class="meal-edit-header">
                        <div class="meal-number">${index + 1}</div>
                        <span style="font-weight: 700; font-size: 1.1rem;">餐點 ${index + 1}</span>
                    </div>
                    <div class="meal-edit-fields">
                        <input type="text" id="mealName${index}" value="${meal.name}" placeholder="餐點名稱">
                        <input type="number" id="mealPrice${index}" value="${meal.price}" placeholder="價格">
                    </div>
                </div>
            `).join('');

            editor.innerHTML = html;
        }

        // 切換編輯的日子
        function switchEditDay(day) {
            currentDayMenu = day;
            menuData = weeklyMenu[day];
            renderMenuEditor();
        }

        // 儲存餐單
        function saveMenu() {
            for (let i = 0; i < menuData.length; i++) {
                menuData[i].name = document.getElementById(`mealName${i}`).value;
                menuData[i].price = parseInt(document.getElementById(`mealPrice${i}`).value);
            }

            saveData();
            renderMenu();
            alert(`${document.getElementById('editDaySelect').options[document.getElementById('editDaySelect').selectedIndex].text} 餐單已儲存！`);
        }

        // 渲染訂單列表
        function renderOrdersList() {
            const list = document.getElementById('ordersList');
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + o.price, 0);

            // 計算最受歡迎餐點
            const mealCounts = {};
            orders.forEach(o => {
                mealCounts[o.meal] = (mealCounts[o.meal] || 0) + 1;
            });
            const topMeal = Object.entries(mealCounts).sort((a, b) => b[1] - a[1])[0];

            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalRevenue').textContent = '$' + totalRevenue;
            document.getElementById('topMeal').textContent = topMeal ? topMeal[0].split('').slice(0, 4).join('') + '...' : '-';

            if (orders.length === 0) {
                list.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">暫無訂單</div>';
                return;
            }

            list.innerHTML = orders.slice().reverse().map(order => `
                <div class="order-item">
                    <div>
                        <div class="order-info">${order.school} - ${order.name}</div>
                        <div style="color: #999; font-size: 0.9rem;">${order.class} | ${order.day || '未指定'}</div>
                    </div>
                    <div class="order-meal">${order.meal}</div>
                    <div class="order-time">${order.time}</div>
                    <span class="order-status status-${order.status}">
                        ${order.status === 'confirmed' ? '已確認' : order.status === 'pending' ? '待處理' : '已取消'}
                    </span>
                </div>
            `).join('');
        }

        // 數據持久化（使用 localStorage）
        function saveData() {
            localStorage.setItem('schoolWeeklyMenu', JSON.stringify(weeklyMenu));
            localStorage.setItem('schoolOrders', JSON.stringify(orders));
        }

        function loadData() {
            const savedMenu = localStorage.getItem('schoolWeeklyMenu');
            const savedOrders = localStorage.getItem('schoolOrders');

            if (savedMenu) {
                weeklyMenu = JSON.parse(savedMenu);
                menuData = weeklyMenu[currentDayMenu];
            }
            if (savedOrders) {
                orders = JSON.parse(savedOrders);
            }
        }

        // 點擊彈窗外部關閉
        document.getElementById('adminLoginModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAdminLogin();
            }
        });
    </script>
</body>
</html>
